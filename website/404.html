<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<!-- amre-preconnect -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://www.googletagmanager.com">
<link rel="preconnect" href="https://raw.githubusercontent.com">
<link rel="preconnect" href="https://res.cloudinary.com">
<link rel="dns-prefetch" href="https://media-production.lp-cdn.com">
<link rel="dns-prefetch" href="https://tally.so">

<meta name="robots" content="noindex,nofollow">
<title>Page Not Found · AMRE Real Estate Group</title>
<script>
(function(){
  // Legacy URLs from before the May 2026 cutover used a /website/ prefix.
  // Strip it and redirect immediately so old shared links keep working.
  var p = location.pathname || '';
  if (p.indexOf('/website/') === 0) {
    var newPath = p.replace(/^\/website\//, '/') || '/';
    location.replace(newPath + location.search + location.hash);
  }
})();
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Montserrat:wght@300;400;500&display=swap');
:root{
  --forest:#1c3d31;
  --ink:#1a1a1a;
  --mid:#5a5a5a;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'Montserrat',-apple-system,BlinkMacSystemFont,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--sans);font-weight:300;color:var(--ink);background:#fff;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;
}
.wrap{max-width:560px;text-align:center}
.eyebrow{
  font-size:11px;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--forest);font-weight:500;margin-bottom:24px;
}
h1{
  font-family:var(--serif);font-weight:400;
  font-size:clamp(48px,8vw,80px);line-height:1;
  margin-bottom:24px;color:var(--forest);
}
p{font-size:16px;line-height:1.6;color:var(--mid);margin-bottom:12px}
.cta{
  display:inline-block;margin-top:32px;padding:14px 32px;
  background:var(--forest);color:#fff;border-radius:999px;
  font-size:14px;font-weight:500;letter-spacing:0.04em;
  transition:background .25s,transform .25s;
  text-decoration:none;
}
.cta:hover{background:#163328;transform:translateY(-1px)}
.links{margin-top:40px;font-size:14px}
.links a{color:var(--forest);text-decoration:underline;text-underline-offset:3px;margin:0 12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">AMRE Real Estate Group</div>
  <h1>404</h1>
  <p>The page you're looking for doesn't exist or has moved.</p>
  <p>If you arrived from an older link, we may have updated our site structure.</p>
  <a class="cta" href="/">Return to home</a>
  <div class="links">
    <a href="/buyers/">Buyers</a>
    <a href="/sellers/">Sellers</a>
    <a href="/about/">Team</a>
    <a href="/contact/">Contact</a>
  </div>
</div>
</body>
</html>
